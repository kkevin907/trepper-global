[build]
  command   = "npm run build"
  publish   = "dist"

[functions]
  directory = "netlify/functions"

[build.environment]
  NODE_VERSION = "22"

# Sicherheits- und Performance-Header für alle Seiten
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"

# Statische Assets lang cachen (Fonts, Bilder, JS, CSS)
[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

# Sitemap + robots nicht cachen
[[headers]]
  for = "/sitemap*.xml"
  [headers.values]
    Cache-Control = "public, max-age=3600"

# 404 auf eigene Fehlerseite routen
[[redirects]]
  from   = "/*"
  to     = "/404"
  status = 404
